name: Publish Docs

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: pip install -r docs/requirements.txt

      - name: Build docs
        run: mkdocs build --site-dir site

      - name: Deploy to hectorvent.github.io/static/floci
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          git clone --depth=1 https://x-access-token:${PAGES_TOKEN}@github.com/hectorvent/hectorvent.github.io.git pages-repo

          rm -rf pages-repo/static/floci
          cp -r site pages-repo/static/floci

          cd pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/floci/
          git diff --cached --quiet || git commit -m "docs: update floci docs"
          git push
